<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioApp - Administración de Libros</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>📚 BiblioApp - Admin</h1>
            </div>
            <ul class="navbar-menu">
                <li><a href="../index.html">Catálogo</a></li>
                <li><a href="libros.html">Libros</a></li>
                <li><a href="prestamos.html">Préstamos</a></li>
                <li><a href="usuarios.html">Usuarios</a></li>
                <li><button id="logout-btn" class="btn btn-danger">Cerrar Sesión</button></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="admin-section">
            <h2>Gestión de Libros</h2>

            <div class="form-card">
                <h3>Agregar Nuevo Libro</h3>
                <form id="libro-form">
                    <div class="form-group">
                        <label for="titulo">Título:</label>
                        <input type="text" id="titulo" required>
                    </div>
                    <div class="form-group">
                        <label for="autor">Autor:</label>
                        <input type="text" id="autor" required>
                    </div>
                    <div class="form-group">
                        <label for="isbn">ISBN:</label>
                        <input type="text" id="isbn">
                    </div>
                    <div class="form-group">
                        <label for="categoria">Categoría:</label>
                        <input type="text" id="categoria" required>
                    </div>
                    <div class="form-group">
                        <label for="anio_publicacion">Año de Publicación:</label>
                        <input type="number" id="anio_publicacion">
                    </div>
                    <div class="form-group">
                        <label for="stock_total">Stock Total:</label>
                        <input type="number" id="stock_total" value="1" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="descripcion">Descripción:</label>
                        <textarea id="descripcion"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Agregar Libro</button>
                </form>
            </div>

            <div class="libros-table">
                <h3>Libros Registrados</h3>
                <div id="libros-container">
                    <p>Cargando libros...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/api.js?v=20260620"></script>
    <script src="../js/auth.js?v=20260620"></script>
    <script src="../js/dom.js?v=20260620"></script>
    <script src="../js/admin.js?v=20260620"></script>
</body>
</html>
