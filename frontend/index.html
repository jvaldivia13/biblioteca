<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioApp - Catálogo de Libros</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>📚 BiblioApp</h1>
            </div>
            <ul class="navbar-menu" id="navbar-menu">
                <li><a href="index.html">Catálogo</a></li>
                <li><a href="mis-prestamos.html" id="mis-prestamos-link" style="display:none;">Mis Préstamos</a></li>
                <li><a href="admin/libros.html" id="admin-libros-link" style="display:none;">Admin</a></li>
                <li><a href="login.html" id="login-link">Iniciar Sesión</a></li>
                <li><button id="logout-btn" style="display:none;" class="btn btn-danger">Cerrar Sesión</button></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="search-section">
            <h2>Búsqueda de Libros</h2>
            <div class="search-form">
                <input type="text" id="search-input" placeholder="Buscar por título o autor...">
                <select id="category-select">
                    <option value="">Todas las categorías</option>
                </select>
                <button id="search-btn" class="btn btn-primary">Buscar</button>
            </div>
        </section>

        <section class="books-section">
            <h2>Catálogo</h2>
            <div id="books-container" class="books-grid">
                <p>Cargando libros...</p>
            </div>
            <div class="pagination" id="pagination"></div>
        </section>
    </main>

    <script src="js/api.js?v=20260620"></script>
    <script src="js/auth.js?v=20260620"></script>
    <script src="js/dom.js?v=20260620"></script>
    <script src="js/libros.js?v=20260620"></script>
</body>
</html>
